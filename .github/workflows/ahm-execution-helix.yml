# =============================================================================
# AHM Execution Helix — Unified CI Workflow
#
# Consolidates: API E2E, Web E2E, Android E2E, and Gatling Perf
# into a single file with conditional jobs controlled by `platform` input.
# =============================================================================

name: AHM — Execution Helix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to test'
        required: false
        default: all
        type: choice
        options: [all, api, web, android, ios, perf]
      perf_profile:
        description: 'Gatling injection profile (perf only)'
        required: false
        default: smoke
        type: choice
        options: [smoke, load, stress]
      perf_users:
        description: 'Virtual user count (perf load/stress)'
        required: false
        default: '20'
      perf_duration:
        description: 'Ramp duration in seconds (perf load only)'
        required: false
        default: '120'
      android_api_level:
        description: 'Android API level'
        required: false
        default: '34'
        type: choice
        options: ['28', '29', '30', '31', '32', '33', '34']

# ---------------------------------------------------------------------------
# Shared environment — inherited by every job
# ---------------------------------------------------------------------------
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '22'
  LOG_LEVEL: info
  OMNIPIZZA_RELEASE_BASE_URL: https://github.com/gsanchezm/OmniPizza/releases/download/v1.0.1
  PLAYWRIGHT_VERSION: '1.58.2'

# =============================================================================
# JOBS
# =============================================================================
jobs:

  # ---------------------------------------------------------------------------
  # Job 1: API E2E
  # ---------------------------------------------------------------------------
  api-smoke:
    name: API E2E — Checkout
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch'
      && inputs.platform == 'api'

    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start MinIO Telemetry Storage
        run: |
          if docker compose version >/dev/null 2>&1; then
            docker compose -f infrastructure/minio-compose.yml up -d
          else
            docker-compose -f infrastructure/minio-compose.yml up -d
          fi
          sleep 5

      - name: Start proxy + API plugin
        run: |
          npx ts-node -r dotenv/config src/kernel/chaos-proxy.ts &
          npx ts-node -r dotenv/config src/plugins/api/server.ts &
          for port in 50051 50055; do
            for i in $(seq 1 20); do
              nc -z localhost $port 2>/dev/null && echo "port $port ready" && break
              sleep 1
            done
          done
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: api
          DRIVER: api
          PLUGIN_API: 'true'

      - name: Run Cucumber suite (API layer)
        run: pnpm test --tags '@api'
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: api
          DRIVER: api
          MINIO_ENDPOINT: localhost
          MINIO_PORT: '9000'
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin

      - name: Parse JSONL to CSV Artifacts
        if: always()
        run: |
          RESULTS_DIR=$(ls -d results/* 2>/dev/null | head -n 1)
          if [ -z "$RESULTS_DIR" ]; then
            echo "No results directory found. Telemetry is required for AHM runs."
            exit 1
          fi
          npx ts-node src/telemetry/parse-telemetry.ts "$RESULTS_DIR"

      - name: Upload Telemetry Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ahm-telemetry-${{ github.job }}-${{ github.run_id }}
          path: results/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 2: Web E2E — Desktop
  # ---------------------------------------------------------------------------
  e2e-web:
    name: E2E — Web Desktop (Playwright)
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.platform == 'all'
      || inputs.platform == 'web'

    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}
          restore-keys: playwright-${{ runner.os }}-
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start MinIO Telemetry Storage
        run: |
          if docker compose version >/dev/null 2>&1; then
            docker compose -f infrastructure/minio-compose.yml up -d
          else
            docker-compose -f infrastructure/minio-compose.yml up -d
          fi
          sleep 5

      - name: Start proxy + plugins
        run: |
          npx ts-node -r dotenv/config src/kernel/chaos-proxy.ts &
          npx ts-node -r dotenv/config src/plugins/playwright/server.ts &
          npx ts-node -r dotenv/config src/plugins/api/server.ts &
          for port in 50051 50052 50055; do
            for i in $(seq 1 20); do
              nc -z localhost $port 2>/dev/null && echo "port $port ready" && break
              sleep 1
            done
          done
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: web
          VIEWPORT: desktop
          DRIVER: playwright
          HEADLESS: 'true'
          PLUGIN_PLAYWRIGHT: 'true'
          PLUGIN_API: 'true'

      - name: Run E2E tests
        run: pnpm test --tags '@desktop'
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: web
          VIEWPORT: desktop
          DRIVER: playwright
          HEADLESS: 'true'
          MINIO_ENDPOINT: localhost
          MINIO_PORT: '9000'
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin

      - name: Parse JSONL to CSV Artifacts
        if: always()
        run: |
          RESULTS_DIR=$(ls -d results/* 2>/dev/null | head -n 1)
          if [ -z "$RESULTS_DIR" ]; then
            echo "No results directory found. Telemetry is required for AHM runs."
            exit 1
          fi
          npx ts-node src/telemetry/parse-telemetry.ts "$RESULTS_DIR"

      - name: Upload Telemetry Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ahm-telemetry-${{ github.job }}-${{ github.run_id }}
          path: results/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 3: Web E2E — Responsive
  # ---------------------------------------------------------------------------
  e2e-web-responsive:
    name: E2E — Web Responsive (Playwright)
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.platform == 'all'
      || inputs.platform == 'web'

    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}
          restore-keys: playwright-${{ runner.os }}-
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start MinIO Telemetry Storage
        run: |
          if docker compose version >/dev/null 2>&1; then
            docker compose -f infrastructure/minio-compose.yml up -d
          else
            docker-compose -f infrastructure/minio-compose.yml up -d
          fi
          sleep 5

      - name: Start proxy + plugins
        run: |
          npx ts-node -r dotenv/config src/kernel/chaos-proxy.ts &
          npx ts-node -r dotenv/config src/plugins/playwright/server.ts &
          npx ts-node -r dotenv/config src/plugins/api/server.ts &
          for port in 50051 50052 50055; do
            for i in $(seq 1 20); do
              nc -z localhost $port 2>/dev/null && echo "port $port ready" && break
              sleep 1
            done
          done
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: web
          VIEWPORT: responsive
          DRIVER: playwright
          HEADLESS: 'true'
          PLUGIN_PLAYWRIGHT: 'true'
          PLUGIN_API: 'true'

      - name: Run E2E tests
        run: pnpm test --tags '@responsive'
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: web
          VIEWPORT: responsive
          DRIVER: playwright
          HEADLESS: 'true'
          MINIO_ENDPOINT: localhost
          MINIO_PORT: '9000'
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin

      - name: Parse JSONL to CSV Artifacts
        if: always()
        run: |
          RESULTS_DIR=$(ls -d results/* 2>/dev/null | head -n 1)
          if [ -z "$RESULTS_DIR" ]; then
            echo "No results directory found. Telemetry is required for AHM runs."
            exit 1
          fi
          npx ts-node src/telemetry/parse-telemetry.ts "$RESULTS_DIR"

      - name: Upload Telemetry Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ahm-telemetry-${{ github.job }}-${{ github.run_id }}
          path: results/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 4: Android E2E
  # ---------------------------------------------------------------------------
  e2e-android:
    name: E2E — Android (Appium)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch'
      && (inputs.platform == 'all' || inputs.platform == 'android')

    steps:
      - uses: actions/checkout@v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Android app artifact
        run: |
          mkdir -p assets/apps/android
          curl -fL "$OMNIPIZZA_RELEASE_BASE_URL/omnipizza-release.apk" \
            -o assets/apps/android/app-release.apk
          ls -lh assets/apps/android/app-release.apk

      - name: Start MinIO Telemetry Storage
        run: |
          if docker compose version >/dev/null 2>&1; then
            docker compose -f infrastructure/minio-compose.yml up -d
          else
            docker-compose -f infrastructure/minio-compose.yml up -d
          fi
          sleep 5

      - name: Start Android emulator (docker-android)
        run: |
          docker run -d \
            --name android-emulator \
            --privileged \
            --device /dev/kvm \
            -p 5554:5554 \
            -p 5555:5555 \
            -e API_LEVEL=${{ inputs.android_api_level || '34' }} \
            -e IMG_TYPE=google_apis \
            -e ARCHITECTURE=x86_64 \
            -e DEVICE_ID=pixel \
            -e MEMORY=4096 \
            -e CORES=2 \
            -e DISABLE_ANIMATION=1 \
            -e SKIP_AUTH=1 \
            halimqarroum/docker-android:api-${{ inputs.android_api_level || '34' }}

      - name: Start Appium server
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2
          appium --relaxed-security &
          sleep 5

      - name: Wait for emulator to be ready
        run: |
          echo "Waiting for ADB device to appear..."
          adb connect localhost:5555
          for i in $(seq 1 40); do
            if adb -s localhost:5555 shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; then
              echo "Emulator ready after $((i * 15))s"
              break
            fi
            echo "  Attempt $i/40 — waiting 15s..."
            sleep 15
          done
          adb devices

      - name: Start proxy + Appium plugin
        run: |
          npx ts-node -r dotenv/config src/kernel/chaos-proxy.ts &
          npx ts-node -r dotenv/config src/plugins/appium/server.ts &
          npx ts-node -r dotenv/config src/plugins/api/server.ts &
          for port in 50051 50053 50055; do
            for i in $(seq 1 20); do
              nc -z localhost $port 2>/dev/null && echo "port $port ready" && break
              sleep 1
            done
          done
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: android
          DRIVER: appium
          APPIUM_HOST: localhost
          APPIUM_PORT: '4723'
          CAP_PROFILE: docker_android
          ANDROID_APP_PATH: assets/apps/android/app-release.apk
          ANDROID_UDID: localhost:5555
          PLUGIN_APPIUM: 'true'
          PLUGIN_API: 'true'

      - name: Run E2E tests
        id: android_tests
        run: pnpm test --tags '@android'
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: android
          DRIVER: appium
          APPIUM_HOST: localhost
          APPIUM_PORT: '4723'
          CAP_PROFILE: docker_android
          ANDROID_APP_PATH: assets/apps/android/app-release.apk
          ANDROID_UDID: localhost:5555
          MINIO_ENDPOINT: localhost
          MINIO_PORT: '9000'
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin

      - name: Show Android emulator logs
        if: failure()
        run: |
          docker ps -a --filter name=android-emulator
          if docker ps -a --format '{{.Names}}' | grep -qx android-emulator; then
            docker logs --tail 200 android-emulator
          else
            echo "android-emulator container was not created."
          fi

      - name: Parse JSONL to CSV Artifacts
        if: always() && steps.android_tests.outcome != 'skipped'
        run: |
          RESULTS_DIR=$(ls -d results/* 2>/dev/null | head -n 1)
          if [ -z "$RESULTS_DIR" ]; then
            echo "No results directory found. Telemetry is required for AHM runs."
            exit 1
          fi
          npx ts-node src/telemetry/parse-telemetry.ts "$RESULTS_DIR"

      - name: Upload Telemetry Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ahm-telemetry-${{ github.job }}-${{ github.run_id }}
          path: results/
          retention-days: 30

      - name: Stop emulator
        if: always()
        run: docker rm -f android-emulator || true

  # ---------------------------------------------------------------------------
  # Job 5: iOS E2E
  # ---------------------------------------------------------------------------
  e2e-ios:
    name: E2E — iOS (Appium)
    runs-on: macos-latest
    if: >-
      github.event_name == 'workflow_dispatch'
      && (inputs.platform == 'all' || inputs.platform == 'ios')

    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download iOS simulator artifact
        run: |
          mkdir -p assets/apps/ios
          curl -fL "$OMNIPIZZA_RELEASE_BASE_URL/OmniPizza-Simulator.zip" \
            -o assets/apps/ios/OmniPizza-Simulator.zip
          ls -lh assets/apps/ios/OmniPizza-Simulator.zip

      - name: Unpack iOS simulator app
        run: |
          rm -rf assets/apps/ios/unpacked
          mkdir -p assets/apps/ios/unpacked
          unzip -q assets/apps/ios/OmniPizza-Simulator.zip -d assets/apps/ios/unpacked
          IOS_APP_PATH=$(find assets/apps/ios/unpacked -maxdepth 3 -name '*.app' -type d | head -n 1)
          if [ -z "$IOS_APP_PATH" ]; then
            echo "No .app bundle found inside OmniPizza-Simulator.zip"
            find assets/apps/ios/unpacked -maxdepth 3 -print
            exit 1
          fi
          echo "IOS_APP_PATH=$IOS_APP_PATH" >> "$GITHUB_ENV"
          echo "Using iOS app bundle: $IOS_APP_PATH"

      - name: Select and boot iOS simulator
        run: |
          DEVICE_LINE=$(xcrun simctl list devices available | grep -E 'iPhone .*\([A-F0-9-]+\) \((Shutdown|Booted)\)' | head -n 1)
          if [ -z "$DEVICE_LINE" ]; then
            echo "No available iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi
          IOS_DEVICE_NAME=$(echo "$DEVICE_LINE" | sed -E 's/^[[:space:]]*([^()]+)[[:space:]]+\(.*/\1/' | xargs)
          IOS_UDID=$(echo "$DEVICE_LINE" | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          echo "IOS_DEVICE_NAME=$IOS_DEVICE_NAME" >> "$GITHUB_ENV"
          echo "IOS_UDID=$IOS_UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$IOS_UDID" || true
          xcrun simctl bootstatus "$IOS_UDID" -b
          xcrun simctl list devices "$IOS_UDID"

      - name: Start Appium server
        run: |
          npm install -g appium@latest
          appium driver install xcuitest
          appium --relaxed-security &
          sleep 5

      - name: Start proxy + Appium plugin
        run: |
          npx ts-node -r dotenv/config src/kernel/chaos-proxy.ts &
          npx ts-node -r dotenv/config src/plugins/appium/server.ts &
          npx ts-node -r dotenv/config src/plugins/api/server.ts &
          for port in 50051 50053 50055; do
            for i in $(seq 1 20); do
              nc -z localhost $port 2>/dev/null && echo "port $port ready" && break
              sleep 1
            done
          done
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: ios
          DRIVER: appium
          APPIUM_HOST: localhost
          APPIUM_PORT: '4723'
          CAP_PROFILE: ${{ vars.IOS_CAP_PROFILE || 'iphone_16_pro' }}
          IOS_APP_PATH: ${{ vars.IOS_APP_PATH || env.IOS_APP_PATH }}
          IOS_UDID: ${{ env.IOS_UDID }}
          IOS_DEVICE_NAME: ${{ env.IOS_DEVICE_NAME }}
          PLUGIN_APPIUM: 'true'
          PLUGIN_API: 'true'

      - name: Run E2E tests
        run: pnpm test --tags '@ios'
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: ios
          DRIVER: appium
          APPIUM_HOST: localhost
          APPIUM_PORT: '4723'
          CAP_PROFILE: ${{ vars.IOS_CAP_PROFILE || 'iphone_16_pro' }}
          IOS_APP_PATH: ${{ vars.IOS_APP_PATH || env.IOS_APP_PATH }}
          IOS_UDID: ${{ env.IOS_UDID }}
          IOS_DEVICE_NAME: ${{ env.IOS_DEVICE_NAME }}

      - name: Parse JSONL to CSV Artifacts
        if: always()
        run: |
          RESULTS_DIR=$(ls -d results/* 2>/dev/null | head -n 1)
          if [ -z "$RESULTS_DIR" ]; then
            echo "No results directory found. Telemetry is required for AHM runs."
            exit 1
          fi
          npx ts-node src/telemetry/parse-telemetry.ts "$RESULTS_DIR"

      - name: Upload Telemetry Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ahm-telemetry-${{ github.job }}-${{ github.run_id }}
          path: results/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 6: Perf — Gatling Simulation
  # ---------------------------------------------------------------------------
  perf-gatling:
    name: Perf — Gatling ${{ inputs.perf_profile || 'smoke' }}
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push'
      || (github.event_name == 'workflow_dispatch'
          && (inputs.platform == 'all' || inputs.platform == 'perf'))

    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Cache Gatling JRE bundle
        uses: actions/cache@v5
        with:
          path: node_modules/@gatling.io/cli/.gatling
          key: gatling-jre-${{ runner.os }}-${{ hashFiles('node_modules/@gatling.io/cli/package.json') }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run simulation
        run: pnpm perf:${{ inputs.perf_profile || 'smoke' }}
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PERF_USERS: ${{ inputs.perf_users || '20' }}
          PERF_DURATION: ${{ inputs.perf_duration || '120' }}
          LANGUAGE: en

      - name: Upload Gatling HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gatling-report-${{ inputs.perf_profile || 'smoke' }}-${{ github.run_id }}
          path: target/gatling/
          if-no-files-found: ignore
          retention-days: 30
