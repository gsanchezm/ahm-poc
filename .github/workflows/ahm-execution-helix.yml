# =============================================================================
# AHM Execution Helix — Unified CI Workflow
#
# Consolidates: API E2E, Web E2E, Android E2E, and Gatling Perf
# into a single file with conditional jobs controlled by `platform` input.
#
# Trigger behavior:
#   push / PR → main   : api + web + perf:smoke   (Android excluded — too heavy)
#   workflow_dispatch   : pick any platform, or `all`
# =============================================================================

name: AHM — Execution Helix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to test'
        required: false
        default: all
        type: choice
        options: [all, api, web, android, perf]
      perf_profile:
        description: 'Gatling injection profile (perf only)'
        required: false
        default: smoke
        type: choice
        options: [smoke, load, stress]
      perf_users:
        description: 'Virtual user count (perf load/stress)'
        required: false
        default: '20'
      perf_duration:
        description: 'Ramp duration in seconds (perf load only)'
        required: false
        default: '120'
      android_api_level:
        description: 'Android API level'
        required: false
        default: '34'
        type: choice
        options: ['28', '29', '30', '31', '32', '33', '34']

# ---------------------------------------------------------------------------
# Shared environment — inherited by every job
# ---------------------------------------------------------------------------
env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'
  LOG_LEVEL: info

# =============================================================================
# JOBS
# =============================================================================
jobs:

  # ---------------------------------------------------------------------------
  # Job 1: API E2E — Checkout (Cucumber over gRPC)
  # Runs on: push, PR, manual (platform=all|api)
  # ---------------------------------------------------------------------------
  api-smoke:
    name: API E2E — Checkout
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.platform == 'all'
      || inputs.platform == 'api'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start proxy + API plugin
        run: |
          npx ts-node -r dotenv/config src/kernel/chaos-proxy.ts &
          npx ts-node -r dotenv/config src/plugins/api/server.ts &
          for port in 50051 50055; do
            for i in $(seq 1 20); do
              nc -z localhost $port 2>/dev/null && echo "port $port ready" && break
              sleep 1
            done
          done
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: api
          DRIVER: api
          PLUGIN_API: 'true'

      - name: Run Cucumber suite (API layer)
        run: pnpm test
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: api
          DRIVER: api

  # ---------------------------------------------------------------------------
  # Job 2: Web E2E — Playwright
  # Runs on: push, PR, manual (platform=all|web)
  # ---------------------------------------------------------------------------
  e2e-web:
    name: E2E — Web (Playwright)
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.platform == 'all'
      || inputs.platform == 'web'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start proxy + plugins
        run: |
          npx ts-node -r dotenv/config src/kernel/chaos-proxy.ts &
          npx ts-node -r dotenv/config src/plugins/playwright/server.ts &
          npx ts-node -r dotenv/config src/plugins/api/server.ts &
          for port in 50051 50052 50055; do
            for i in $(seq 1 20); do
              nc -z localhost $port 2>/dev/null && echo "port $port ready" && break
              sleep 1
            done
          done
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: web
          VIEWPORT: desktop
          DRIVER: playwright
          HEADLESS: 'true'
          PLUGIN_PLAYWRIGHT: 'true'
          PLUGIN_API: 'true'

      - name: Run E2E tests
        run: pnpm test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: web
          VIEWPORT: desktop
          DRIVER: playwright
          HEADLESS: 'true'

  # ---------------------------------------------------------------------------
  # Job 3: Android E2E — Appium + docker-android
  # Runs on: manual ONLY (platform=all|android)
  # ---------------------------------------------------------------------------
  e2e-android:
    name: E2E — Android (Appium)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch'
      && (inputs.platform == 'all' || inputs.platform == 'android')

    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Android emulator (docker-android)
        run: |
          docker run -d \
            --name android-emulator \
            --privileged \
            --device /dev/kvm \
            -p 5554:5554 \
            -p 5555:5555 \
            -e API_LEVEL=${{ inputs.android_api_level || '34' }} \
            -e IMG_TYPE=google_apis \
            -e ARCHITECTURE=x86_64 \
            -e DEVICE_ID=pixel \
            -e MEMORY=4096 \
            -e CORES=2 \
            -e DISABLE_ANIMATION=1 \
            -e SKIP_AUTH=1 \
            halimqarroum/docker-android:api-${{ inputs.android_api_level || '34' }}

      - name: Start Appium server
        run: |
          npm install -g appium@latest
          appium --relaxed-security &
          sleep 5

      - name: Wait for emulator to be ready
        run: |
          echo "Waiting for ADB device to appear..."
          adb connect localhost:5555
          for i in $(seq 1 40); do
            if adb -s localhost:5555 shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; then
              echo "Emulator ready after $((i * 15))s"
              break
            fi
            echo "  Attempt $i/40 — waiting 15s..."
            sleep 15
          done
          adb devices

      - name: Start proxy + Appium plugin
        run: |
          npx ts-node -r dotenv/config src/kernel/chaos-proxy.ts &
          npx ts-node -r dotenv/config src/plugins/appium/server.ts &
          npx ts-node -r dotenv/config src/plugins/api/server.ts &
          for port in 50051 50053 50055; do
            for i in $(seq 1 20); do
              nc -z localhost $port 2>/dev/null && echo "port $port ready" && break
              sleep 1
            done
          done
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: android
          DRIVER: appium
          APPIUM_HOST: localhost
          APPIUM_PORT: '4723'
          ANDROID_APP_PATH: assets/apps/android/app-release.apk
          PLUGIN_APPIUM: 'true'
          PLUGIN_API: 'true'

      - name: Run E2E tests
        run: pnpm test
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: android
          DRIVER: appium
          APPIUM_HOST: localhost
          APPIUM_PORT: '4723'
          ANDROID_APP_PATH: assets/apps/android/app-release.apk

      - name: Stop emulator
        if: always()
        run: docker stop android-emulator && docker rm android-emulator

  # ---------------------------------------------------------------------------
  # Job 4: Perf — Gatling Simulation
  # Runs on: push to main, manual (platform=all|perf)
  # ---------------------------------------------------------------------------
  perf-gatling:
    name: Perf — Gatling ${{ inputs.perf_profile || 'smoke' }}
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push'
      || (github.event_name == 'workflow_dispatch'
          && (inputs.platform == 'all' || inputs.platform == 'perf'))

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Cache Gatling JRE bundle
        uses: actions/cache@v4
        with:
          path: node_modules/@gatling.io/cli/.gatling
          key: gatling-jre-${{ runner.os }}-${{ hashFiles('node_modules/@gatling.io/cli/package.json') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run simulation
        run: pnpm perf:${{ inputs.perf_profile || 'smoke' }}
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PERF_USERS: ${{ inputs.perf_users || '20' }}
          PERF_DURATION: ${{ inputs.perf_duration || '120' }}
          LANGUAGE: en

      - name: Upload Gatling HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatling-report-${{ inputs.perf_profile || 'smoke' }}-${{ github.run_id }}
          path: target/gatling/
          retention-days: 30
